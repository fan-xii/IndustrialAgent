version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: industrial-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped

volumes:
  qdrant_data:
